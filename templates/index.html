<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankruptcy Risk Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 500px; background: white; padding: 30px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #3498db; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 25px; padding: 15px; border-radius: 4px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Corporate Bankruptcy Risk</h2>
    <form id="predictionForm">
        <div class="form-group">
            <label>Current Assets / Total Assets</label>
            <input type="number" step="any" name="Current Assets/Total Assets" required value="0.15">
        </div>
        <div class="form-group">
            <label>Debt Ratio %</label>
            <input type="number" step="any" name="Debt Ratio %" required value="0.85">
        </div>
        <div class="form-group">
            <label>Net Income to Total Assets</label>
            <input type="number" step="any" name="Net Income to Total Assets" required value="-0.4">
        </div>
        
        <button type="submit">Analyze Financial Solvency</button>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.style.backgroundColor = '#e1f5fe';
        resultDiv.style.color = '#0288d1';
        resultDiv.innerText = 'Analyzing data pipeline values...';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if(result.prediction_code === 1) {
                resultDiv.style.backgroundColor = '#ffebee';
                resultDiv.style.color = '#c62828';
            } else {
                resultDiv.style.backgroundColor = '#e8f5e9';
                resultDiv.style.color = '#2e7d32';
            }
            resultDiv.innerText = `Status: ${result.status}`;
        } catch (error) {
            resultDiv.style.backgroundColor = '#ffebee';
            resultDiv.style.color = '#c62828';
            resultDiv.innerText = 'Error connecting to prediction engine.';
        }
    });
</script>
</body>
</html>
